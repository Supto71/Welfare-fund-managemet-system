app = "welfare-fund-supto71"
primary_region = "sin"

[http_service]
  internal_port = 5000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[mounts]]
  source = "welfare_data"
  destination = "/data"

[env]
  NODE_ENV = "production"
  DB_PATH = "/data/welfare_fund.db"
