<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>লগইন — আসেন খাই কল্যাণ তহবিল</title>
  <meta name="description" content="আসেন খাই কল্যাণ তহবিল ম্যানেজমেন্ট সিস্টেম — সদস্যদের শেয়ার ও কল্যাণ তহবিল পরিচালনা করুন।" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="login.css" />
</head>
<body class="login-page">

  <!-- ── Toast container ───────────────────────────────────── -->
  <div id="toast-container" aria-live="polite"></div>

  <!-- ── Background decorations ───────────────────────────── -->
  <div class="bg-blob blob-1" aria-hidden="true"></div>
  <div class="bg-blob blob-2" aria-hidden="true"></div>

  <!-- ── Login card ────────────────────────────────────────── -->
  <main class="login-wrap">
    <div class="login-card">

      <!-- Brand -->
      <div class="brand">
        <div class="brand-icon">
          <img src="logo.png" alt="তহবিল লোগো" width="48" height="48" />
        </div>
        <div class="brand-text">
          <h1 class="brand-title bn">আসেন খাই কল্যাণ তহবিল</h1>
          <p class="brand-sub">Share &amp; Welfare Fund Management</p>
        </div>
      </div>

      <div class="login-divider"></div>

      <!-- Heading -->
      <div class="login-heading">
        <h2>স্বাগতম! 👋</h2>
        <p class="text-muted text-sm">আপনার অ্যাকাউন্টে লগইন করুন</p>
      </div>

      <!-- Alert area -->
      <div id="login-alert" class="alert alert-danger hidden" role="alert"></div>

      <!-- Form -->
      <form id="login-form" novalidate autocomplete="off">

        <div class="form-group">
          <label for="email" class="form-label">ইমেইল</label>
          <div class="input-icon-wrap">
            <span class="input-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
            </span>
            <input
              type="email"
              id="email"
              name="email"
              class="form-control"
              placeholder="admin@example.com"
              autocomplete="username"
              required
            />
          </div>
        </div>

        <div class="form-group" style="margin-top:1rem">
          <label for="password" class="form-label">পাসওয়ার্ড</label>
          <div class="input-icon-wrap">
            <span class="input-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            </span>
            <input
              type="password"
              id="password"
              name="password"
              class="form-control"
              placeholder="••••••••"
              autocomplete="current-password"
              required
            />
            <button type="button" class="toggle-pw" id="toggle-pw" aria-label="পাসওয়ার্ড দেখান">
              <svg id="eye-open" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg id="eye-closed" class="hidden" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-block btn-lg" id="login-btn" style="margin-top:1.5rem">
          <span id="login-btn-text">লগইন করুন</span>
          <span id="login-spinner" class="spinner hidden"></span>
        </button>

      </form>

      <!-- Demo credentials hint -->
      <div class="demo-hint">
        <span class="demo-label">ডেমো অ্যাকাউন্ট</span>
        <div class="demo-creds">
          <div class="demo-item" data-email="admin@asenkhaikakalyan.com" data-pw="Admin@1234" title="ক্লিক করে পূরণ করুন">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/></svg>
            Admin
          </div>
          <div class="demo-item" data-email="anisur@asenkhaikakalyan.com" data-pw="Member@1234" title="ক্লিক করে পূরণ করুন">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
            Member
          </div>
        </div>
      </div>

    </div>

    <!-- Footer -->
    <p class="login-footer text-muted text-xs">
      &copy; 2025 আসেন খাই কল্যাণ তহবিল &mdash; সকল অধিকার সংরক্ষিত
    </p>
  </main>

  <script src="api.js"></script>
  <script src="login.js"></script>
</body>
</html>
